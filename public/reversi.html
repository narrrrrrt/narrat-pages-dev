<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Reversi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; }
    .top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .top a { text-decoration: none; border: 1px solid #ccc; padding: 6px 10px; border-radius: 6px; }
    #board { border-collapse: collapse; }
    #board td { width: 36px; height: 36px; background: #2f7d32; border: 1px solid #114d16; position: relative; }
    .disc { width: 28px; height: 28px; border-radius: 50%; margin: 0 auto; top: 50%; transform: translateY(-50%); position: relative; }
    .black { background: #111; }
    .white { background: #eee; box-shadow: inset 0 0 0 1px #bbb; }
    .hint { position: absolute; left: 50%; top: 50%; width: 8px; height: 8px; border-radius: 50%; background: orange; transform: translate(-50%, -50%); opacity: .9; }
    .panel { margin-top: 12px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    select, button { padding: 6px 10px; border-radius: 6px; border: 1px solid #bbb; background: white; }
    .debug { margin-top: 16px; font-size: 12px; color: #555; }
    .alert { margin-top: 10px; padding: 8px 10px; border: 1px solid #e99; background: #fee; border-radius: 6px; display: none; }
    .info { margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="top">
    <a href="/index.html">← Lobby</a>
    <div class="info" id="info"></div>
  </div>

  <table id="board" aria-label="Reversi Board"></table>

  <div class="panel">
    <label>Col:
      <select id="col"></select>
    </label>
    <label>Row:
      <select id="row"></select>
    </label>
    <button id="submit">Submit</button>
    <span id="turn"></span>
    <span id="you"></span>
    <span id="conn"></span>
  </div>

  <div class="alert" id="alert"></div>

  <div class="debug" id="debug"></div>

  <script src="./reversi.js" defer></script>
</body>
</html>
